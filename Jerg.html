<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jergcraft</title>
  <style>
    body { margin: 0; overflow: hidden; background: #000; color: #fff; font-family: Arial, sans-serif; }
    #loading {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: radial-gradient(circle, #1b2631, #05070a);
      z-index: 10;
      flex-direction: column;
    }
    #game {
      display: none;
      width: 100vw;
      height: 100vh;
      background: #87c6ff;
    }
    canvas { display: block; width: 100%; height: 100%; }
  </style>
</head>
<body>
  <div id="loading">
    <h1>Jergcraft</h1>
    <p>Loading world...</p>
  </div>

  <div id="game">
    <canvas id="gameCanvas"></canvas>
  </div>

  <script>
    setTimeout(() => {
      document.getElementById("loading").style.display = "none";
      document.getElementById("game").style.display = "block";

      const canvas = document.getElementById("gameCanvas");
      const ctx = canvas.getContext("2d");

      function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        draw();
      }

      function draw() {
        ctx.fillStyle = "#87c6ff";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#4caf50";
        ctx.fillRect(0, canvas.height - 120, canvas.width, 120);
        ctx.fillStyle = "#8b5a2b";
        ctx.fillRect(80, canvas.height - 200, 50, 80);
        ctx.fillRect(60, canvas.height - 220, 90, 30);
      }

      window.addEventListener("resize", resize);
      resize();
    }, 2000);
  </script>
</body>
</html>
