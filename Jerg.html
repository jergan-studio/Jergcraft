<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jergcraft</title>
  <style>
    body {
      margin: 0;
      background: #0b0f14;
      color: #e8f1ff;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }
    .screen {
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background:
        linear-gradient(rgba(0,0,0,.35), rgba(0,0,0,.35)),
        repeating-linear-gradient(
          45deg,
          #1a232d 0 20px,
          #141b23 20px 40px
        );
      text-align: center;
    }
    .logo {
      font-size: 64px;
      font-weight: 900;
      letter-spacing: 4px;
      text-transform: uppercase;
      text-shadow: 4px 4px 0 #000;
      margin-bottom: 12px;
    }
    .sub {
      font-size: 18px;
      opacity: .85;
    }
    .bar {
      margin-top: 24px;
      width: 320px;
      height: 18px;
      border: 2px solid #fff;
      background: #111;
      box-shadow: 0 0 0 3px #000;
    }
    .fill {
      width: 65%;
      height: 100%;
      background: #6cc04a;
    }
  </style>
</head>
<body>
  <div class="screen">
    <div class="logo">Jergcraft</div>
    <div class="sub">Loading world...</div>
    <div class="bar"><div class="fill"></div></div>
  </div>
</body>
</html>
