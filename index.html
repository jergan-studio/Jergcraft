<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Jergcraft</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">

    <style>
        /* Base page styling */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #111;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
            -webkit-user-select: none;
        }

        /* Selection Menu Styling */
        #menu-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1e1e1e 0%, #111111 100%);
            z-index: 9999;
            transition: opacity 0.4s ease, visibility 0.4s;
        }

        h1 {
            color: #fff;
            font-size: 3rem;
            margin-bottom: 2rem;
            text-shadow: 0 4px 8px rgba(0,0,0,0.5);
            letter-spacing: 2px;
        }

        .button-group {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .menu-btn {
            background-color: #4a4a4a;
            color: white;
            border: 2px solid #666;
            padding: 15px 40px;
            font-size: 1.25rem;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: background-color 0.2s, transform 0.1s;
        }

        .menu-btn:hover {
            background-color: #5a5a5a;
            border-color: #888;
        }

        .menu-btn:active {
            transform: scale(0.98);
        }

        /* Game Frame Styling */
        #game-frame {
            width: 100%;
            height: 100%;
            border: none;
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
    </style>
</head>
<body>

    <div id="menu-container">
        <h1>JERGCRAFT</h1>
        <div class="button-group">
            <button class="menu-btn" onclick="launchGame('mobile')">MOBILE</button>
            <button class="menu-btn" onclick="launchGame('computer')">COMPUTER</button>
        </div>
    </div>

    <iframe 
        id="game-frame"
        allow="autoplay; gamepad; fullscreen; keyboard"
        sandbox="allow-same-origin allow-scripts allow-pointer-lock allow-forms">
    </iframe>

    <script type="text/javascript">
        // Text Replacement Logic (Runs on the host page text)
        function replaceTextInNode(node) {
            if (node.nodeType === Node.TEXT_NODE) {
                const originalText = node.nodeValue;
                const updatedText = originalText.replace(/eaglercraft/gi, (match) => {
                    if (match === match.toUpperCase()) return 'JERGCRAFT';
                    if (match[0] === match[0].toUpperCase()) return 'Jergcraft';
                    return 'jergcraft';
                });
                if (originalText !== updatedText) {
                    node.nodeValue = updatedText;
                }
            } else if (node.nodeName !== 'SCRIPT' && node.nodeName !== 'STYLE') {
                for (let child of node.childNodes) {
                    replaceTextInNode(child);
                }
            }
        }

        if (document.body) replaceTextInNode(document.body);
