<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

<title>Jergcraft</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">


<style>

html, body {
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:#0d0d0d;
    font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    user-select:none;
    -webkit-user-select:none;
}


#menu-container {

    position:fixed;
    top:0;
    left:0;

    width:100%;
    height:100%;

    display:flex;
    flex-direction:column;

    align-items:center;
    justify-content:center;

    background:
    linear-gradient(
        135deg,
        #1c1c1c 0%,
        #0d0d0d 100%
    );

    z-index:999;

}



h1 {

    color:white;

    font-size:3.5rem;

    margin-top:0;
    margin-bottom:2.5rem;

    text-shadow:
    0 5px 15px rgba(0,0,0,0.6);

    letter-spacing:4px;

    font-weight:800;

}




.button-group {

    display:flex;

    gap:25px;

    flex-wrap:wrap;

    justify-content:center;

    margin-bottom:20px;

    width:100%;

    max-width:600px;

}





.menu-btn {

    background:#333333;

    color:white;

    border:2px solid #555555;

    padding:
    18px 45px;

    font-size:1.4rem;

    font-weight:bold;

    cursor:pointer;

    border-radius:6px;


    box-shadow:
    0 6px 10px rgba(0,0,0,0.4);


    transition:
    background-color .2s,
    border-color .2s,
    transform .1s;

}



.menu-btn:hover {

    background:#444444;

    border-color:#888888;

}



.menu-btn:active {

    transform:scale(.96);

}





#game-frame {

    width:100%;

    height:100%;

    border:none;

    display:none;

    position:absolute;

    top:0;

    left:0;

    z-index:1;

}


</style>

</head>


<body>


<div id="menu-container">


<h1>JERGCRAFT</h1>


<div style="
color:#888;
font-size:14px;
margin-bottom:20px;
">

UPD!: theres none

</div>



<div class="button-group">


<button class="menu-btn" id="btn-manual-mobile">

MOBILE

</button>



<button class="menu-btn" id="btn-manual-comp">

COMPUTER

</button>


</div>



</div>





<iframe

id="game-frame"

allow="
autoplay;
gamepad;
fullscreen;
keyboard;
pointer-lock;
xr-spatial-tracking
">

</iframe>





<script src="jergcraft.js?v=1.0.1"></script>


</body>

</html>
