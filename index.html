<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Jergcraft 3D OpenVoxel Hub</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">

    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #05080c;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
            -webkit-user-select: none;
        }

        /* Front Hub Dashboard Overlay */
        #menu-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle, #1a2634 0%, #080d14 100%);
            z-index: 10;
            transition: opacity 0.4s ease;
        }

        h1 {
            color: #00ffcc;
            font-size: 3.5rem;
            margin-top: 0;
            margin-bottom: 2.5rem;
            text-shadow: 0 5px 15px rgba(0,0,0,0.6);
            letter-spacing: 4px;
            font-weight: 800;
        }

        .button-group {
            display: flex;
            gap: 25px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 20px;
            width: 100%;
            max-width: 600px;
        }

        .menu-btn {
            background-color: #111;
            color: #00ffcc;
            border: 2px solid #00ffcc;
            padding: 18px 45px;
            font-size: 1.4rem;
            font-weight: bold;
            cursor: pointer;
            border-radius: 6px;
            box-shadow: 0 6px 15px rgba(0,255,204,0.2);
            transition: background-color 0.2s, border-color 0.2s, transform 0.1s, box-shadow 0.2s;
            letter-spacing: 1px;
        }

        .menu-btn:hover {
            background-color: #00ffcc;
            color: #111;
            box-shadow: 0 6px 25px rgba(0,255,204,0.4);
        }

        .menu-btn:active {
            transform: scale(0.96);
        }

        /* 3D Core Viewport Canvas Engine */
        #render-canvas {
            display: none;
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* Native HUD Player Chat Interface */
        #chat-panel {
            position: fixed;
            bottom: 20px;
            left: 20px;
            width: 380px;
            height: 260px;
            z-index: 50;
            display: none;
            flex-direction: column;
            pointer-events: none;
        }
        #chat-logs {
            flex: 1;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 4px;
            padding: 10px;
            overflow-y: auto;
            color: #fff;
            font-size: 14px;
            text-shadow: 1px 1px 2px #000;
            margin-bottom: 8px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        #chat-input {
            width: 100%;
            background: rgba(10, 15, 20, 0.85);
            border: 1px solid #00ffcc;
            padding: 10px;
            border-radius: 4px;
            color: #fff;
            outline: none;
            pointer-events: auto;
            font-size: 14px;
            box-sizing: border-box;
        }

        /* Server Management Modal overlay layout */
        #server-modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 360px;
            background: #0c121a;
            border: 2px solid #00ffcc;
            border-radius: 8px;
            padding: 25px;
            color: #fff;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            z-index: 1005;
            display: none;
            text-align: center;
        }
        .srv-input {
            width: 90%;
            background: #05080c;
            border: 1px solid #223446;
            padding: 10px;
            border-radius: 4px;
            color: #fff;
            text-align: center;
            font-size: 14px;
            margin-bottom: 12px;
            outline: none;
        }
        .srv-input:focus {
            border-color: #00ffcc;
        }

        #jerg-server-list {

            overflow-y: auto;
