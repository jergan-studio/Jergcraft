<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Jergcraft</title>
    
    <style>
        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none; -webkit-user-select: none;
        }

        #menu-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: linear-gradient(rgba(0, 0, 0, 0.2), rgba(0, 0, 0, 0.4)), 
                        radial-gradient(circle at center bottom, #e07a5f 0%, #3d405b 60%, #0f172a 100%);
            background-size: cover; z-index: 10;
        }

        .corner-info {
            position: absolute; top: 12px; left: 15px;
            color: #fcd34d; font-size: 13px; font-weight: bold;
            line-height: 1.4; text-shadow: 1px 1px 2px #000;
        }

        .credits-indicator {
            position: absolute; top: 15px; right: 20px;
            background: rgba(0, 0, 0, 0.4); border: 2px solid #374151;
            padding: 6px 16px; color: #d1d5db; font-size: 13px; font-weight: bold;
            border-radius: 2px;
        }

        .logo-wrapper {
            position: relative; margin-bottom: 40px; text-align: center;
        }
        .main-title {
            color: #f3f4f6; font-size: 4rem; font-weight: 900; letter-spacing: 2px;
            margin: 0; text-shadow: 4px 4px 0px #374151; font-style: italic;
        }
        .subtitle-edition {
            color: #f3f4f6; font-size: 1.1rem; font-weight: bold; letter-spacing: 4px;
            margin-top: -5px; text-shadow: 2px 2px 0px #000;
        }

        .splash-text {
            position: absolute; right: -40px; bottom: -10px;
            color: #facc15; font-size: 1.3rem; font-weight: bold;
            transform: rotate(-15deg); text-shadow: 2px 2px 0px #000;
            animation: splashPulse 0.5s infinite alternate ease-in-out;
        }
        @keyframes splashPulse {
            0% { transform: rotate(-15deg) scale(1.0); }
            100% { transform: rotate(-15deg) scale(1.08); }
        }

        .dev-info-label {
            color: #e5e7eb; font-size: 15px; font-weight: bold;
            text-align: center; margin-bottom: 20px; text-shadow: 1px 1px 2px #000;
        }

        .menu-button-stack {
            display: flex; flex-direction: column; gap: 12px;
            width: 100%; max-width: 400px; box-sizing: border-box;
        }
        .split-button-row { display: flex; gap: 12px; width: 100%; }

        .mc-btn {
            width: 100%; background: #4b5563; color: #e5e7eb;
            border: 2px solid #1f2937; border-top-color: #9ca3af; border-left-color: #6b7280;
            padding: 10px 0; font-size: 15px; font-weight: bold; cursor: pointer;
            text-align: center; border-radius: 2px; box-shadow: inset 0 -4px 0 rgba(0,0,0,0.3);
            text-shadow: 1px 1px 2px #000; outline: none;
        }
        .mc-btn:hover { background: #6b7280; border-color: #111827; border-top-color: #d1d5db; color: #fff; }
        .mc-btn:active { padding-top: 12px; padding-bottom: 8px; box-shadow: inset 0 2px 0 rgba(0,0,0,0.5); }
        .mc-btn.disabled { background: rgba(31, 41, 55, 0.6); color: #9ca3af; border-color: #111827; cursor: not-allowed; box-shadow: none; }

        .bottom-left-info { position: absolute; bottom: 12px; left: 15px; color: #fff; font-size: 13px; font-weight: bold; line-height: 1.4; text-shadow: 1px 1px 2px #000; }
        .bottom-right-info { position: absolute; bottom: 12px; right: 15px; color: #fff; font-size: 13px; font-weight: bold; text-shadow: 1px 1px 2px #000; }

        #render-canvas { display: none; width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 1; }
        #chat-panel { position: fixed; bottom: 20px; left: 20px; width: 380px; height: 260px; z-index: 50; display: none; flex-direction: column; pointer-events: none; }
        #chat-logs { flex: 1; background: rgba(0, 0, 0, 0.45); border-radius: 4px; padding: 10px; overflow-y: auto; color: #fff; font-size: 14px; text-shadow: 1px 1px 2px #000; margin-bottom: 8px; display: flex; flex-direction: column; gap: 4px; }
        #chat-input { width: 100%; background: rgba(10, 15, 20, 0.85); border: 1px solid #00ffcc; padding: 10px; border-radius: 4px; color: #fff; outline: none; pointer-events: auto; font-size: 14px; box-sizing: border-box; }
    </style>
</head>
<body>

    <div id="menu-container">
        <div class="corner-info">Based Off EaglercraftX<br>By Lax1dude</div>
        <div class="credits-indicator">vool23</div>

        <div class="logo-wrapper">
            <h1 class="main-title">JERGCRAFT</h1>
            <div class="subtitle-edition">VOXEL EDITION</div>
            <div class="splash-text">Got your nose!</div>
        </div>

        <div class="dev-info-label">EaglercraftZ u4 Reference Style<br>Made by Jergcraft-Devs</div>

        <div class="menu-button-stack">
            <button class="mc-btn" id="btn-singleplayer">Singleplayer</button>
            <button class="mc-btn" id="btn-multiplayer">Multiplayer</button>
            <button class="mc-btn disabled">EaglercraftZ Realms (SOON)</button>
            <div class="split-button-row">
                <button class="mc-btn">Options...</button>
                <button class="mc-btn">Edit Profile</button>
            </div>
        </div>

        <div class="bottom-left-info">Minecraft 1.20.4<br>EaglercraftZ 1.20-u4 Release [JS]</div>
        <div class="bottom-right-info">Resources Copyright Mojang AB</div>
    </div>

    <canvas id="render-canvas"></canvas>

    <div id="chat-panel">
        <div id="chat-logs"></div>
        <input type="text" id="chat-input" placeholder="Press Enter to write chat message...">
    </div>

    <script>
        const menu = document.getElementById('menu-container');
        const canvas = document.getElementById('render-canvas');
        const chat = document.getElementById('chat-panel');

        function loadScript(src, callback) {
            const s = document.createElement('script');
            s.src = src;
            s.onload = callback;
            document.body.appendChild(s);
        }

        // Singleplayer Option: Loads the standalone Map array module
        document.getElementById('btn-singleplayer').onclick = () => {
            menu.style.display = 'none';
            canvas.style.display = 'block';
            chat.style.display = 'flex';
            loadScript('Map/forest.js', () => {
                if (window.initSingleplayerEngine) window.initSingleplayerEngine();
            });
        };

        // Multiplayer Option: Loads the WebSocket Server communication module
        document.getElementById('btn-multiplayer').onclick = () => {
            menu.style.display = 'none';
            canvas.style.display = 'block';
            chat.style.display = 'flex';
            loadScript('Javascript/jergcraft.js');
        };
    </script>
</body>
</html>
