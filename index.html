<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Jergcraft Mobile</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">

    <style>
        /* Force the game canvas to strictly match the mobile screen dimensions */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: sans-serif;
            /* Prevents mobile pull-to-refresh and glow effects */
            overscroll-behavior: none; 
            /* Disables double-tap zooming features on mobile devices */
            touch-action: none; 
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }

        canvas {
            width: 100vw !important;
            height: 100vh !important;
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* Basic loading screen indicator */
        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #111;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            z-index: 9999;
            transition: opacity 0.5s ease;
        }
    </style>

    <script type="text/javascript" src="eaglerpocketmobile.user.js"></script>

</head>
<body>

    <div id="loading-screen">Loading Jergcraft Mobile...</div>

    <canvas id="canvas"></canvas>

    <script type="text/javascript" src="classes.js"></script>
    <script type="text/javascript">
        // Standard Eaglercraft initialization hook
        window.addEventListener("load", function() {
            // Hide the loading screen once assets are prepared
            const loader = document.getElementById("loading-screen");
            if(loader) loader.style.opacity = "0";
            setTimeout(() => loader.remove(), 500);

            // Insert your specific Jergcraft main engine configuration here:
            const mainMainMain = {
                container: "canvas",
                assetsURI: "assets.epk",
                serverList: [
                    { addr: "ws://localhost:25565", name: "Local Server" }
                ]
            };
            
            // logger/init command usually called by your kit
            // e.g., root.main(mainMainMain);
        });
    </script>

</body>
</html>
