<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Jergcraft</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">

    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0d0d0d;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
            -webkit-user-select: none;
        }

        #menu-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1c1c1c 0%, #0d0d0d 100%);
            z-index: 999;
            transition: opacity 0.4s ease;
        }

        h1 {
            color: #fff;
            font-size: 3.5rem;
            margin-bottom: 2.5rem;
            text-shadow: 0 5px 15px rgba(0,0,0,0.6);
            letter-spacing: 4px;
            font-weight: 800;
        }

        .button-group {
            display: flex;
            gap: 25px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 20px;
        }

        .menu-btn {
            background-color: #333333;
            color: #ffffff;
            border: 2px solid #555555;
            padding: 18px 45px;
            font-size: 1.4rem;
            font-weight: bold;
            cursor: pointer;
            border-radius: 6px;
            box-shadow: 0 6px 10px rgba(0,0,0,0.4);
            transition: background-color 0.2s, border-color 0.2s, transform 0.1s;
            letter-spacing: 1px;
        }

        .menu-btn:hover {
            background-color: #444444;
            border-color: #888888;
        }

        .jerg-manage-btn {
            background-color: #141414;
            color: #00ffcc;
            border: 2px solid #00ffcc;
        }
        .jerg-manage-btn:hover {
            background-color: #00ffcc;
            color: #141414;
            border-color: #00ffcc;
        }

        .menu-btn:active {
            transform: scale(0.96);
        }

        #game-frame {
            width: 100%;
            height: 100%;
            border: none;
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* Server Dashboard Panel UI */
        #jerg-dashboard-modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 320px;
            background: #141414;
            border: 2px solid #00ffcc;
            border-radius: 8px;
            padding: 25px;
            color: #fff;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            z-index: 1005;
            display: none;
            text-align: center;
        }
        .dashboard-input {
            width: 90%;
            background: #222;
            border: 1px solid #444;
            padding: 10px;
            border-radius: 4px;
            color: #fff;
            text-align: center;
            font-size: 14px;
            margin-bottom: 12px;
            outline: none;
        }

            border-color: #00ffcc;
        }
