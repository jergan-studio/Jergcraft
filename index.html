<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Jergcraft Launcher</title>

<style>

html, body {
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    overflow:hidden;
    font-family:Arial, sans-serif;
    background:#111;
}


#menu-container {

    position:fixed;

    width:100%;
    height:100%;

    display:flex;
    flex-direction:column;

    align-items:center;
    justify-content:center;


    background:
    linear-gradient(
        rgba(0,0,0,.45),
        rgba(0,0,0,.75)
    ),
    url("https://github.com/jergan-studio/Jergcraft/blob/main/image_2026-07-07_123050798.png?raw=true");


    background-size:cover;
    background-position:center;

}



h1 {

    color:white;

    font-size:70px;

    font-weight:900;

    letter-spacing:5px;


    text-shadow:
    4px 4px 0 #222,
    -2px -2px 0 #222;


    margin:0 0 10px 0;

}



.version {

    color:#ddd;

    font-size:18px;

    margin-bottom:35px;

}



.button-group {

    display:flex;

    flex-direction:column;

    gap:15px;

    width:350px;

}



.menu-btn {


    background:#727272;


    color:white;


    border:3px solid #222;


    padding:18px;


    font-size:22px;


    font-weight:bold;


    cursor:pointer;


    text-shadow:
    2px 2px #333;


    box-shadow:

    inset 0 3px rgba(255,255,255,.2),

    0 5px 0 #111;



    transition:.1s;

}




.menu-btn:hover {

    background:#8b8b8b;

}




.menu-btn:active {

    transform:translateY(4px);


    box-shadow:

    inset 0 3px rgba(0,0,0,.3);

}





#game-frame {

    width:100%;

    height:100%;

    border:none;

    display:none;

    position:absolute;

    top:0;

    left:0;

}



</style>

</head>


<body>


<div id="menu-container">


<h1>
JERGCRAFT
</h1>


<div class="version">
Minecraft Edition • Jergcraft Launcher
</div>


<div class="button-group">


<button class="menu-btn" id="btn-manual-mobile">
MOBILE
</button>


<button class="menu-btn" id="btn-manual-comp">
COMPUTER
</button>


</div></div>


<iframe

id="game-frame"

allow="
autoplay;
gamepad;
fullscreen;
keyboard;
pointer-lock;
xr-spatial-tracking
">

</iframe>



<script src="jergcraft.js?v=1.0.1"></script>



</body>

</html>
