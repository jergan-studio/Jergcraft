    <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Jergcraft Mobile Stream</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">

    <style>
        /* Eliminate all borders, margins, and scrolling on the host page */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            touch-action: none;
        }

        /* Force the embedded frame to fill the exact mobile screen boundaries */
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
            position: absolute;
            top: 0;
            left: 0;
        }
    </style>
</head>
<body>

    <iframe 
        src="https://irv77.github.io/EaglerPocketMobile/demo/" 
        allow="autoplay; gamepad; fullscreen; keyboard"
        sandbox="allow-same-origin allow-scripts allow-pointer-lock allow-forms">
    </iframe>

</body>
</html>
