<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Jergcraft Live WebSocket Terminal</title>
    <style>
        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #020617;
            font-family: 'Courier New', Courier, monospace;
            color: #38bdf8; user-select: none;
        }
        
        /* Top Navigation HUD */
        #jerg-hud-bar {
            position: fixed; top: 0; left: 0; width: 100%; height: 55px;
            background: #0f172a; z-index: 100; display: flex; 
            align-items: center; justify-content: space-between;
            padding: 0 20px; box-sizing: border-box; 
            border-bottom: 2px solid #00ffcc;
        }
        .hud-title {
            color: #00ffcc; font-size: 1.4rem; font-weight: bold; letter-spacing: 2px; margin: 0;
            font-family: sans-serif;
        }
        .hud-btn-group { display: flex; gap: 15px; }
        .hud-btn {
            background: #1e293b; color: #00ffcc; border: 1px solid #00ffcc;
            padding: 6px 16px; font-size: 0.9rem; font-weight: bold; cursor: pointer;
            border-radius: 4px; transition: all 0.2s ease; font-family: sans-serif;
        }
        .hud-btn:hover { background: #00ffcc; color: #0f172a; box-shadow: 0 0 10px rgba(0,255,204,0.4); }
        .hud-btn.disabled {
            border-color: #475569; color: #475569; background: #1e293b; cursor: not-allowed;
        }

        /* Live Stream Dashboard Layout */
        #main-container {
            display: flex; flex-direction: column; height: calc(100% - 55px);
            margin-top: 55px; padding: 20px; box-sizing: border-box; gap: 15px;
        }

        /* Network Telemetry Metrics */
        #telemetry-ribbon {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px; background: #0f172a; border: 1px solid #1e293b; padding: 15px; border-radius: 6px;
        }
        .metric-card { display: flex; flex-direction: column; gap: 5px; }
        .metric-label { font-size: 0.8rem; color: #64748b; text-transform: uppercase; }
        .metric-value { font-size: 1.2rem; font-weight: bold; color: #f8fafc; }
        .status-online { color: #4ade80; }
        .status-offline { color: #f87171; }

        /* Raw Terminal Display */
        #stream-terminal {
            flex: 1; background: #090d16; border: 1px solid #1e293b;
            border-radius: 6px; padding: 15px; overflow-y: auto;
            display: flex; flex-direction: column; gap: 6px;
            box-shadow: inset 0 4px 20px rgba(0,0,0,0.5);
        }
        .log-entry { font-size: 0.9rem; line-height: 1.4; word-break: break-all; }
        .log-time { color: #64748b; margin-right: 8px; }
        .log-inbound { color: #4ade80; }
        .log-outbound { color: #a855f7; }
        .log-system { color: #eab308; }

        /* Control Input Area */
        #input-container {
            display: flex; gap: 10px; background: #0f172a; padding: 10px; border-radius: 6px; border: 1px solid #1e293b;
        }
        #packet-payload {
            flex: 1; background: #020617; border: 1px solid #334155; padding: 12px;
            color: #f8fafc; font-family: monospace; outline: none; border-radius: 4px;
        }
        #packet-payload:focus { border-color: #00ffcc; }
        #btn-send {
            background: #00ffcc; color: #020617; border: none; padding: 0 25px;
            font-weight: bold; cursor: pointer; border-radius: 4px; transition: background 0.2s;
        }
        #btn-send:hover { background: #22d3ee; }

        /* Manager Modal */
        #server-modal {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 360px; background: #0f172a; border: 2px solid #00ffcc; border-radius: 8px;
            padding: 25px; color: #fff; box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index: 1005;
            display: none; text-align: center; font-family: sans-serif;
        }
        .srv-input {
            width: 90%; background: #020617; border: 1px solid #334155; padding: 10px;
            border-radius: 4px; color: #fff; text-align: center; font-size: 14px; margin-bottom: 12px; outline: none;
        }
    </style>
</head>
<body>

    <div id="jerg-hud-bar">
        <h1 class="hud-title">JERGCRAFT NET-STREAM</h1>
        <div class="hud-btn-group">
            <button class="hud-btn" id="btn-open-jergservers">JERGSERVERS</button>
            <button class="hud-btn disabled" title="Realms interface pipeline active soon">REALMS (SOON)</button>
        </div>
    </div>

    <div id="main-container">
        
        <div id="telemetry-ribbon">
            <div class="metric-card">
                <span class="metric-label">Target Node</span>
                <span class="metric-value" id="val-node">Connecting...</span>
            </div>
            <div class="metric-card">
                <span class="metric-label">Socket Status</span>
                <span class="metric-value status-offline" id="val-status">CLOSED</span>
            </div>
            <div class="metric-card">
                <span class="metric-label">Packets Recv</span>
                <span class="metric-value" id="val-rx">0</span>
            </div>
            <div class="metric-card">
                <span class="metric-label">Packets Sent</span>
                <span class="metric-value" id="val-tx">0</span>
            </div>
        </div>

        <div id="stream-terminal"></div>

        <div id="input-container">
            <input type="text" id="packet-payload" placeholder='Type custom payload data string or raw text to transmit... (e.g. {"type":"ping"})'>
            <button id="btn-send">SEND PACKET</button>
        </div>
    </div>
