<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Jergcraft</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">

    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0d0d0d;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
            -webkit-user-select: none;
        }

        #menu-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1c1c1c 0%, #0d0d0d 100%);
            z-index: 999;
            opacity: 1;
        }

        h1 {
            color: #fff;
            font-size: 3.5rem;
            margin-top: 0;
            margin-bottom: 2.5rem;
            text-shadow: 0 5px 15px rgba(0,0,0,0.6);
            letter-spacing: 4px;
            font-weight: 800;
        }

        .button-group {
            display: flex;
            gap: 25px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 20px;
            width: 100%;
            max-width: 600px;
        }

        .menu-btn {
            background-color: #333333;
            color: #ffffff;
            border: 2px solid #555555;
            padding: 18px 45px;
            font-size: 1.4rem;
            font-weight: bold;
            cursor: pointer;
            border-radius: 6px;
            box-shadow: 0 6px 10px rgba(0,0,0,0.4);
            transition: background-color 0.2s, border-color 0.2s, transform 0.1s;
            letter-spacing: 1px;
        }

        .menu-btn:hover {
            background-color: #444444;
            border-color: #888888;
        }

        .jerg-manage-btn {
            background-color: #141414;
            color: #00ffcc;
            border: 2px solid #00ffcc;
        }
        .jerg-manage-btn:hover {
            background-color: #00ffcc;
            color: #141414;
            border-color: #00ffcc;
        }

        .menu-btn:active {
            transform: scale(0.96);
        }

        #game-frame {
            width: 100%;
            height: 100%;
            border: none;
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        #jerg-dashboard-modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 320px;
            background: #141414;
            border: 2px solid #00ffcc;
            border-radius: 8px;
            padding: 25px;
            color: #fff;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            z-index: 1005;
            display: none;
            text-align: center;
            font-family: sans-serif;
        }
        .dashboard-input {
            width: 90%;
            background: #222;
            border: 1px solid #444;
            padding: 10px;
            border-radius: 4px;
            color: #fff;
            text-align: center;
            font-size: 14px;
            margin-bottom: 12px;
            outline: none;
        }
        .dashboard-input:focus {
            border-color: #00ffcc;
        }
        .dashboard-btn-group {
            display: flex;
            gap: 10px;
            margin-top: 5px;
        }
        .dashboard-btn {
            flex: 1;
            padding: 10px;
            border-radius: 4px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            font-size: 13px;
        }
        .btn-add { background: #00ffcc; color: #141414; }
        .btn-close { background: #444; color: #fff; }
    </style>
</head>
<body>

    <div id="menu-container">
        <h1>JERGCRAFT</h1>
        <div class="button-group">
            <button class="menu-btn" id="btn-manual-mobile">MOBILE</button>
            <button class="menu-btn" id="btn-manual-comp">COMPUTER</button>
        </div>
        <div class="button-group">
            <button class="menu-btn jerg-manage-btn" id="btn-open-jergservers">OPEN YOUR JERGSERVERS</button>
        </div>
    </div>

    <div id="jerg-dashboard-modal">
        <h3 style="color: #00ffcc; margin: 0 0 5px 0; letter-spacing: 1px;">JERGSERVER MANAGER</h3>
        <p style="color: #888; font-size: 12px; margin: 0 0 20px 0;">Connect your secure https:// domain servers</p>
        
        <input type="text" id="jerg-input-name" class="dashboard-input" placeholder="Server Name">
        <input type="text" id="jerg-input-url" class="dashboard-input" placeholder="https://your-domain.com">
        
        <div class="dashboard-btn-group">
            <button class="dashboard-btn btn-add" id="btn-dashboard-submit">ADD JERGSERVER</button>
            <button class="dashboard-btn btn-close" id="btn-dashboard-close">CLOSE</button>
        </div>
    </div>

    <iframe 
        id="game-frame"
        allow="autoplay; gamepad; fullscreen; keyboard; pointer-lock; xr-spatial-tracking">
    </iframe>

    <script type="text/javascript" src="jergcraft.js?v=1.0.1"></script>

</body>
</html>
