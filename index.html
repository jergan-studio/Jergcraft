<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Jergcraft</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">

    <style>
        /* Reset and Base Layout */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #111;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
            -webkit-user-select: none;
        }

        /* Menu Display Layout */
        #menu-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1c1c1c 0%, #0d0d0d 100%);
            z-index: 9999;
        }

        h1 {
            color: #fff;
            font-size: 3.5rem;
            margin-bottom: 2.5rem;
            text-shadow: 0 5px 15px rgba(0,0,0,0.6);
            letter-spacing: 4px;
            font-weight: 800;
        }

        .button-group {
            display: flex;
            gap: 25px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .menu-btn {
            background-color: #333333;
            color: #ffffff;
            border: 2px solid #555555;
            padding: 18px 45px;
            font-size: 1.4rem;
            font-weight: bold;
            cursor: pointer;
            border-radius: 6px;
            box-shadow: 0 6px 10px rgba(0,0,0,0.4);
            transition: background-color 0.2s, border-color 0.2s, transform 0.1s;
            letter-spacing: 1px;
        }

        .menu-btn:hover {
            background-color: #444444;
            border-color: #888888;
        }

        .menu-btn:active {
            transform: scale(0.96);
        }
    </style>

    <script type="text/javascript" src="jergcraft.js"></script>
</head>
<body>

    <div id="menu-container">
        <h1>JERGCRAFT</h1>
        <div class="button-group">
            <button class="menu-btn" onclick="launchGame('mobile')">MOBILE</button>
            <button class="menu-btn" onclick="launchGame('computer')">COMPUTER</button>
        </div>
    </div>

    <script type="text/javascript">
        /**
         * Route the user to the correct platform engine setup.
         * Redirects fix the canvas mouse lock and button loading issues.
         */
        function launchGame(mode) {
            if (mode === 'mobile') {
                window.location.href = "https://irv77.github.io/EaglerPocketMobile/demo/";
            } else if (mode === 'computer') {
                window.location.href = "https://eaglercraft.app/web/";
            }
        }
    </script>

</body>
</html>
